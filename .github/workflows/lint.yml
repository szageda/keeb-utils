name: Lint and Validate
on: [push, pull_request]

jobs:
  validate-autohotkey-config:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install AutoHotkey v2
        shell: powershell
        run: |
          # Install AutoHotkey v2 using Scoop.
          Set-ExecutionPolicy RemoteSigned -Scope CurrentUser
          irm get.scoop.sh | iex
          scoop bucket add extras
          scoop install autohotkey

      - name: AutoHotkey Syntax Check
        shell: powershell
        run: |
          # 1. Install Scoop and AutoHotkey in the current session.
          Set-ExecutionPolicy RemoteSigned -Scope CurrentUser
          irm get.scoop.sh | iex
          scoop bucket add extras
          scoop install extras/autohotkey
          
          # 2. Force the current session to see the new Scoop path.
          $env:PATH += ";$env:USERPROFILE\scoop\shims"
          
          # 3. Verify it works.
          autohotkey.exe /version
          
          # 4. Run the check using the '/i' flag.
          Get-ChildItem -Recurse -Filter "*.ahk" | ForEach-Object {
            Write-Host "Checking: $($_.FullName)"
            & autohotkey.exe /i "$($_.FullName)"
          }

  validate-kmonad-config:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download the KMonad Binary
        run: |
          # Fetch the static KMonad binary.
          curl -L "https://github.com/kmonad/kmonad/releases/download/0.4.4/kmonad" -o kmonad
          chmod +x kmonad

      - name: KMonad Syntax Check
        run: |
          # Validate the configuration with the '-d' flag.
          find . -name "*.kbd" -exec ./kmonad -d {} +
